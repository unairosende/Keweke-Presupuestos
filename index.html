<script>
const { useState, useEffect, useRef, useCallback, useMemo, useTransition } = React;

function useGoogleAuthHook() {
  const [user, setUser]   = useState(function() { try { return JSON.parse(sessionStorage.getItem('ku')||'null'); } catch(e) { return null; } });
  const [token, setToken] = useState(function() { return sessionStorage.getItem('kt') || null; });
  const [busy, setBusy]   = useState(false);
  const [err,  setErr]    = useState(null);
  var login = useCallback(function() {
    setBusy(true); setErr(null);
    function tryAuth() {
      if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) { setTimeout(tryAuth, 150); return; }
      window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive',
        callback: function(r) {
          if (r.error) { setErr('Error: ' + r.error); setBusy(false); return; }
          var t = r.access_token;
          setToken(t); sessionStorage.setItem('kt', t);
          fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + t } })
            .then(function(x) { return x.json(); }).catch(function() { return {}; })
            .then(function(info) {
              var u = { name: info.name||'Usuario', email: info.email||'', pic: info.picture||'' };
              setUser(u); sessionStorage.setItem('ku', JSON.stringify(u)); setBusy(false);
            });
        }
      }).requestAccessToken({ prompt: '' });
    }
    tryAuth();
  }, []);
  var logout = useCallback(function() {
    if (token && window.google && window.google.accounts && window.google.accounts.oauth2) window.google.accounts.oauth2.revoke(token);
    setUser(null); setToken(null);
    sessionStorage.removeItem('kt'); sessionStorage.removeItem('ku');
  }, [token]);
  return { user: user, token: token, busy: busy, err: err, login: login, logout: logout, ok: !!token };
}

// Lee archivos del Drive y extrae clientes de nombres tipo 17A065_Cliente_Proyecto
async function fetchDriveClients(token) {
  // Lista todos los archivos de la carpeta raíz (y sus subcarpetas un nivel)
  var h = { Authorization: 'Bearer ' + token };
  var allNames = [];
  async function listFolder(folderId) {
    var q = encodeURIComponent("'" + folderId + "' in parents and trashed=false");
    var url = 'https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id,name,mimeType)&supportsAllDrives=true&includeItemsFromAllDrives=true&pageSize=200';
    var r = await fetch(url, { headers: h });
    if (!r.ok) return;
    var data = await r.json();
    var files = data.files || [];
    for (var f of files) {
      if (f.mimeType === 'application/vnd.google-apps.folder') {
        // Entrar en subcarpetas (años)
        await listFolder(f.id);
      } else {
        allNames.push(f.name);
      }
    }
  }
  await listFolder(DRIVE_ROOT_FOLDER);
  // Parsear nombres: 17A065_Cliente_Proyecto o 17A065 Cliente Proyecto
  var clients = [];
  var codes = [];
  for (var name of allNames) {
    // Quitar extensión
    var base = name.replace(/\.[^.]+$/, '');
    // Patrón: empieza con código tipo 17A065 (dígitos + A + dígitos)
    var m = base.match(/^(\d+A\d+)[_\s]+([^_]+)/);
    if (m) {
      codes.push(m[1]);
      var cliente = m[2].trim();
      if (cliente) clients.push(cliente);
    }
  }
  return {
    codes: [...new Set(codes)],
    clients: [...new Set(clients)].sort()

async function sheetAppend(token, row) {
  var proyecto  = row[6];
  var tots      = calcTotals(proyecto);
  var pdfHtml   = buildPDF(proyecto, tots, proyecto.codigo);
  var codigo    = (proyecto.codigo||'').trim();
  var cliente   = (proyecto.cliente||'').replace(/[^\w\s\u00C0-\u024F.-]/g,'').trim();
  var nombre    = (proyecto.nombre||'').replace(/[^\w\s\u00C0-\u024F.-]/g,'').trim();
  var fileName  = codigo + '_' + cliente + '_' + nombre + '.pdf.html';
  var htmlBytes = new TextEncoder().encode(pdfHtml);

  // Encontrar o crear subcarpeta del año actual en DRIVE_ROOT_FOLDER
  var year = new Date().getFullYear().toString();
  var folderId = await getOrCreateYearFolder(token, year);

  var boundary  = 'keweke_b314159';
  var nl = '\r\n';
  var meta = JSON.stringify({ name: fileName, mimeType: 'text/html', parents: [folderId] });
  var p1 = new TextEncoder().encode('--'+boundary+nl+'Content-Type: application/json; charset=UTF-8'+nl+nl+meta+nl);
  var p2 = new TextEncoder().encode('--'+boundary+nl+'Content-Type: text/html; charset=UTF-8'+nl+nl);
  var p4 = new TextEncoder().encode(nl+'--'+boundary+'--');
  var body = new Uint8Array(p1.length+p2.length+htmlBytes.length+p4.length);
  body.set(p1,0); body.set(p2,p1.length); body.set(htmlBytes,p1.length+p2.length); body.set(p4,p1.length+p2.length+htmlBytes.length);
  var r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true',
    { method:'POST', headers:{ Authorization:'Bearer '+token, 'Content-Type':'multipart/related; boundary="'+boundary+'"' }, body: body });
  if (!r.ok) throw new Error((await r.json()).error?.message || 'Error Drive');
  return await r.json();
}

// Encuentra o crea la carpeta del año dentro de DRIVE_ROOT_FOLDER
async function getOrCreateYearFolder(token, year) {
  var h = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' };
  // Buscar si ya existe
  var q = encodeURIComponent("name='" + year + "' and '" + DRIVE_ROOT_FOLDER + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
  var r = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id)&supportsAllDrives=true&includeItemsFromAllDrives=true', { headers: h });
  if (r.ok) {
    var data = await r.json();
    if (data.files && data.files.length > 0) return data.files[0].id;
  }
  // Crear si no existe
  var cr = await fetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true', {
    method: 'POST',
    headers: h,
    body: JSON.stringify({ name: year, mimeType: 'application/vnd.google-apps.folder', parents: [DRIVE_ROOT_FOLDER] })
  });
  if (!cr.ok) throw new Error('No se pudo crear carpeta ' + year);
  return (await cr.json()).id;
}

const DB_SHEET = 'Presupuestos_DB';

async function dbLoad(token) {
  var r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(DB_SHEET + '!A:G'),
    { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) return [];
  var rows = (await r.json()).values || [];
  if (rows.length < 2) return [];
  return rows.slice(1).map(function(row) {
    try { return JSON.parse(row[6] || '{}'); } catch(e) { return null; }
  }).filter(Boolean);
}

async function dbSave(token, proyecto) {
  var tots = calcTotals(proyecto);
  var importe = tots ? tots.total.toFixed(2) : '0.00';
  var existing = await dbFindRow(token, proyecto.id);
  var rowData = [proyecto.id, proyecto.codigo, proyecto.cliente, proyecto.nombre, proyecto.fecha, importe, JSON.stringify(proyecto)];
  if (existing > 0) {
    var range = encodeURIComponent(DB_SHEET + '!A' + existing + ':G' + existing);
    await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + range + '?valueInputOption=RAW',
      { method:'PUT', headers:{ Authorization:'Bearer '+token, 'Content-Type':'application/json' }, body: JSON.stringify({ values: [rowData] }) });
  } else {
    var range2 = encodeURIComponent(DB_SHEET + '!A:G');
    await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + range2 + ':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS',
      { method:'POST', headers:{ Authorization:'Bearer '+token, 'Content-Type':'application/json' }, body: JSON.stringify({ values: [rowData] }) });
  }
}

async function dbFindRow(token, id) {
  var r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(DB_SHEET + '!A:A'),
    { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) return -1;
  var rows = (await r.json()).values || [];
  for (var i = 1; i < rows.length; i++) { if (rows[i][0] === id) return i + 1; }
  return -1;
}

function nextCode(codes) {
  var counters = (codes||[]).map(function(c) {
    var m = String(c).trim().match(/^(\d+)A(\d+)/);
    return m ? parseInt(m[2]) : 0;
  }).filter(function(n) { return n > 0; });
  if (!counters.length) return '17A066';
  var next = Math.max.apply(null, counters) + 1;
  return '17A' + String(next).padStart(3, '0');
}

// Build secciones from plantilla + TARIFAS
function buildSecciones(tipo) {
  const pl = PLANTILLAS[tipo];
  return pl.secciones.map(sec => ({
    nombre: sec.nombre,
    partidas: sec.keys.map(k => {
      // Find price from TARIFAS
      let precio = 0;
      for (const [, items] of Object.entries(TARIFAS)) {
        const found = items.find(i => i.concepto === k);
        if (found) {
          precio = found.precio;
          break;
        }
      }
      return {
        id: Math.random().toString(36).slice(2),
        concepto: k,
        uds: 0,
        jornadas: 1,
        precio
      };
    })
  }));
}

// nextCode defined above
function calcTotals(p) {
  const sub = (p.secciones || []).reduce((a, s) => a + s.partidas.reduce((b, i) => {
    const base = i.uds * i.jornadas * i.precio;
    return b + base * (1 - (i.dto || 0) / 100);
  }, 0), 0);
  const cm = sub * (1 + p.margen / 100);
  return {
    sub,
    conMargen: cm,
    iva: cm * p.iva / 100,
    total: cm * (1 + p.iva / 100)
  };
}

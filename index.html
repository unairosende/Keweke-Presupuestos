function useGoogleAuthHook() {
  const [user, setUser]   = useState(function() { try { return JSON.parse(sessionStorage.getItem('ku')||'null'); } catch(e) { return null; } });
  const [token, setToken] = useState(function() { return sessionStorage.getItem('kt') || null; });
  const [busy, setBusy]   = useState(false);
  const [err,  setErr]    = useState(null);
  var login = useCallback(function() {
    setBusy(true); setErr(null);
    function tryAuth() {
      if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) { setTimeout(tryAuth, 150); return; }
      window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive',
        callback: function(r) {
          if (r.error) { setErr('Error: ' + r.error); setBusy(false); return; }
          var t = r.access_token;
          setToken(t); sessionStorage.setItem('kt', t);
          fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + t } })
            .then(function(x) { return x.json(); }).catch(function() { return {}; })
            .then(function(info) {
              var u = { name: info.name||'Usuario', email: info.email||'', pic: info.picture||'' };
              setUser(u); sessionStorage.setItem('ku', JSON.stringify(u)); setBusy(false);
            });
        }
      }).requestAccessToken({ prompt: '' });
    }
    tryAuth();
  }, []);
  var logout = useCallback(function() {
    if (token && window.google && window.google.accounts && window.google.accounts.oauth2) window.google.accounts.oauth2.revoke(token);
    setUser(null); setToken(null);
    sessionStorage.removeItem('kt'); sessionStorage.removeItem('ku');
  }, [token]);
  return { user: user, token: token, busy: busy, err: err, login: login, logout: logout, ok: !!token };
}

  var htmlBytes = new TextEncoder().encode(pdfHtml);
  var boundary  = 'keweke_b314159';
  var nl = '\r\n';
  var meta = JSON.stringify({ name: fileName, mimeType: 'text/html', parents: [FOLDER_ID] });
  var p1 = new TextEncoder().encode('--'+boundary+nl+'Content-Type: application/json; charset=UTF-8'+nl+nl+meta+nl);
  var p2 = new TextEncoder().encode('--'+boundary+nl+'Content-Type: text/html; charset=UTF-8'+nl+nl);
  var p4 = new TextEncoder().encode(nl+'--'+boundary+'--');
  var body = new Uint8Array(p1.length+p2.length+htmlBytes.length+p4.length);
  body.set(p1,0); body.set(p2,p1.length); body.set(htmlBytes,p1.length+p2.length); body.set(p4,p1.length+p2.length+htmlBytes.length);
  var r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true',
    { method:'POST', headers:{ Authorization:'Bearer '+token, 'Content-Type':'multipart/related; boundary="'+boundary+'"' }, body: body });
  if (!r.ok) throw new Error((await r.json()).error?.message || 'Error Drive');
  return await r.json();
}

async function dbFindRow(token, id) {
  var r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(DB_SHEET + '!A:A'),
    { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) return -1;
  var rows = (await r.json()).values || [];
  for (var i = 1; i < rows.length; i++) { if (rows[i][0] === id) return i + 1; }
  return -1;
}

function nextCode(codes) {
  // Only count codes that match the Keweke pattern exactly (17AXXX)
  // and cap at reasonable range to ignore historic imports with high numbers
  var counters = (codes||[]).map(function(c) {
    var m = String(c).trim().match(/^17A(\d{3})$/);
    return m ? parseInt(m[1]) : 0;
  }).filter(function(n) { return n > 0 && n < 500; }); // ignore historic outliers
  if (!counters.length) return '17A066';
  var next = Math.max.apply(null, counters) + 1;
  return '17A' + String(next).padStart(3, '0');
}

// Build secciones from plantilla + TARIFAS
function buildSecciones(tipo) {
  const pl = PLANTILLAS[tipo];
  return pl.secciones.map(sec => ({
    nombre: sec.nombre,
    partidas: sec.keys.map(k => {
      // Find price from TARIFAS
      let precio = 0;
      for (const [, items] of Object.entries(TARIFAS)) {
        const found = items.find(i => i.concepto === k);
        if (found) {
          precio = found.precio;
          break;
        }
      }
      return {
        id: Math.random().toString(36).slice(2),
        concepto: k,
        uds: 0,
        jornadas: 1,
        precio
      };
    })
  }));
}

function calcTotals(p) {
  const sub = (p.secciones || []).reduce((a, s) => a + s.partidas.reduce((b, i) => {
    const base = i.uds * i.jornadas * i.precio;
    return b + base * (1 - (i.dto || 0) / 100);
  }, 0), 0);
  const cm = sub * (1 + p.margen / 100);
  return {
    sub,
    conMargen: cm,
    iva: cm * p.iva / 100,
    total: cm * (1 + p.iva / 100)
  };
}

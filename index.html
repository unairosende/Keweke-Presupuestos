/* ── GOOGLE AUTH ─────────────────────────────────────────────────────────── */
function useAuth() {
  const [user, setUser] = useState(() => {
    try {
      return JSON.parse(sessionStorage.getItem('ku') || 'null');
    } catch {
      return null;
    }
  });
  const [token, setToken] = useState(() => sessionStorage.getItem('kt') || null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const login = useCallback(() => {
    setBusy(true);
    setErr(null);
    const tryAuth = () => {
      if (!window.google?.accounts?.oauth2) {
        setTimeout(tryAuth, 150);
        return;
      }
      window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive',
        callback: async r => {
          if (r.error) {
            setErr('Error Google: ' + r.error);
            setBusy(false);
            return;
          }
          const t = r.access_token;
          setToken(t);
          sessionStorage.setItem('kt', t);
          const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: {
              Authorization: 'Bearer ' + t
            }
          }).then(x => x.json()).catch(() => ({}));
          const u = {
            name: info.name || 'Usuario',
            email: info.email || '',
            pic: info.picture || ''
          };
          setUser(u);
          sessionStorage.setItem('ku', JSON.stringify(u));
          setBusy(false);
        }
      }).requestAccessToken({
        prompt: ''
      });
    };
    tryAuth();
  }, []);
  const logout = useCallback(() => {
    if (token && window.google?.accounts?.oauth2) window.google.accounts.oauth2.revoke(token);
    setUser(null);
    setToken(null);
    sessionStorage.removeItem('kt');
    sessionStorage.removeItem('ku');
  }, [token]);
  return {
    user,
    token,
    busy,
    err,
    login,
    logout,
    ok: !!token
  };
}

    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0f0f;--surface:#181818;--surface2:#222;--surface3:#2a2a2a;
      --border:#2e2e2e;--border2:#3a3a3a;
      --text:#e8e8e8;--text2:#999;--text3:#666;
      --red:#FF4A31;--red2:#ff6347;--red-dim:rgba(255,74,49,0.12);
      --green:#2ecc8f;--blue:#5b9bff;--orange:#FF8C42;

    }
    :root.light{
      --bg:#E1E1E1;--surface:#f0f0f0;--surface2:#e8e8e8;--surface3:#ddd;
      --border:#c8c8c8;--border2:#b8b8b8;
      --text:#161515;--text2:#555;--text3:#888;
      --red:#FF4A31;--red2:#ff6347;--red-dim:rgba(255,74,49,0.1);
      --green:#1a9e6b;--blue:#2d6fd4;--orange:#d4641a;
    }
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
    input,textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:17px;border-radius:var(--r);padding:8px 12px;
      outline:none;transition:border .15s;width:100%}
    input:focus,textarea:focus,select:focus{border-color:var(--red)}
    input.nospin::-webkit-inner-spin-button,input.nospin::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input.nospin{-moz-appearance:textfield}
    button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--r);
      font-size:14px;font-weight:600;transition:all .15s;padding:8px 16px}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .spinner{animation:spin 1s linear infinite;display:inline-block}

          break;
        }
      }
      return {
        id: Math.random().toString(36).slice(2),
        concepto: k,
        uds: 0,
        jornadas: 0,

const fEUR = n => new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n||0);
function calcTotals(p) {
  const sub = (p.secciones || []).reduce((a, s) => a + s.partidas.reduce((b, i) => {
    const base = i.uds * i.jornadas * i.precio;
    return b + base * (1 - (i.dto || 0) / 100);
  }, 0), 0);
  const cm = sub * (1 + p.margen / 100);
  return {
    sub,
    conMargen: cm,
    iva: cm * p.iva / 100,
    total: cm * (1 + p.iva / 100)
  };
}


function nextCode(codes) {
  const nums = (codes||[]).map(c=>{ const m=String(c).match(/A(\d+)$/); return m?parseInt(m[1]):0; }).filter(n=>n>0);
  if(!nums.length) return '17A066';
  return '17A'+String(Math.max(...nums)+1).padStart(3,'0');
}

function waitFB() {
  return new Promise(r => window._FB_READY ? r(window._FB) : window.addEventListener('fb-ready',()=>r(window._FB),{once:true}));
}
// Guarda un presupuesto. Si es nuevo añade createdBy; siempre actualiza updatedBy.
// El parámetro `user` es el objeto de Firebase Auth (o null si no hay sesión).
async function fbSave(proyecto, user) {
  const {db, doc, setDoc, getDoc, serverTimestamp} = await waitFB();
  const tots = calcTotals(proyecto);

  // Info mínima del usuario para guardar en Firestore (sin PII innecesaria)
  const userInfo = user ? {
    uid: user.uid,
    name: user.displayName || user.email || 'Usuario',
    email: user.email || '',
    photo: user.photoURL || ''
  } : null;

  // Comprobar si el documento ya existe para saber si es creación o edición
  let existing = null;
  try {
    const snap = await getDoc(doc(db,'presupuestos',proyecto.id));
    if (snap.exists()) existing = snap.data();
  } catch(_) {}

  const data = {
    ...proyecto,
    importe: tots.total,
    updatedAt: serverTimestamp()
  };

  if (userInfo) {
    // Siempre actualizar updatedBy
    data.updatedBy = userInfo;
    // Solo asignar createdBy la primera vez (nunca sobrescribir)
    if (!existing?.createdBy) {
      data.createdBy = userInfo;
      data.createdAt = existing?.createdAt || new Date().toISOString();
    }
  }

  await setDoc(doc(db,'presupuestos',proyecto.id), data);
}
async function fbDelete(id) {
  const {db, doc, deleteDoc, storage, ref} = await waitFB();
  // First get the document to retrieve pdfUrl and driveFileId
  const {getDoc} = window._FB;
  const snap = await getDoc(doc(db,'presupuestos',id));
  if(snap.exists()) {
    const data = snap.data();
    // Delete from Firebase Storage
    if(data.pdfUrl) {
      try {
        const match = data.pdfUrl.match(/pdfs%2F[^?]+/);
        if(match) {
          const path = decodeURIComponent(match[0]);
          const storageRef = ref(storage, path);
          const {deleteObject} = await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-storage.js');
          await deleteObject(storageRef);
        }
      } catch(e) { console.warn('Storage delete:', e.message); }
    }
    // Delete from Drive via Cloud Function
    if(data.driveFileId) {
      try {
        await fetch('https://europe-west1-keweke-presupuestos-583aa.cloudfunctions.net/deleteDriveFile', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({fileId: data.driveFileId})
        });
      } catch(e) { console.warn('Drive delete:', e.message); }
    }
  }
  await deleteDoc(doc(db,'presupuestos',id));
}
// Llama a la Cloud Function renderPDF para convertir el HTML en PDF real
// y sube el PDF a Storage. Devuelve la URL de descarga.
async function fbUploadPDF(proyecto, html) {
  const {storage, ref, uploadBytes, getDownloadURL} = await waitFB();
  const yr = new Date().getFullYear();
  const safeName = `${proyecto.codigo}_${(proyecto.cliente||'').replace(/[^a-zA-Z0-9]/g,'_')}_${(proyecto.nombre||'').replace(/[^a-zA-Z0-9]/g,'_')}`;
  const path = `pdfs/${yr}/${safeName}.pdf`;

  // 1. Pedir a la Cloud Function que convierta HTML → PDF
  const RENDER_URL = 'https://europe-west1-keweke-presupuestos-583aa.cloudfunctions.net/renderPDF';
  const renderRes = await fetch(RENDER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ html, filename: safeName })
  });
  if (!renderRes.ok) {
    let msg = `Error ${renderRes.status} generando PDF`;
    try { const e = await renderRes.json(); if (e?.error) msg += ': ' + e.error; } catch(_) {}
    throw new Error(msg);
  }
  const pdfBlob = await renderRes.blob();

  // 2. Subir el PDF a Storage
  const r2 = ref(storage, path);
  await uploadBytes(r2, pdfBlob, { contentType: 'application/pdf' });
  return getDownloadURL(r2);
}

// Pide a la Cloud Function que convierta el HTML en PDF real y lo descarga
async function exportPDFlocal(p) {
  const tots = calcTotals(p);
  const html = buildPDF(p, tots, p.codigo);
  const safeName = `${p.codigo}_${(p.cliente||'').replace(/[^a-zA-Z0-9]/g,'_')}_${(p.nombre||'').replace(/[^a-zA-Z0-9]/g,'_')}`;
  const RENDER_URL = 'https://europe-west1-keweke-presupuestos-583aa.cloudfunctions.net/renderPDF';

  let res;
  try {
    res = await fetch(RENDER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html, filename: safeName })
    });
  } catch {
    alert('No se pudo generar el PDF. Comprueba tu conexión.');
    return;
  }

  if (!res.ok) {
    let msg = `Error ${res.status} generando PDF`;
    try { const e = await res.json(); if (e?.error) msg += ': ' + e.error; } catch(_) {}
    alert(msg);
    return;
  }

  // Descargar el PDF
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = safeName + '.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

- Para equipo técnico: si se menciona el rol, uds=1 y jornadas=días de rodaje
- Infiere datos razonables aunque no se digan (ej: si hay rodaje, siempre hay catering)

DESCRIPCIÓN DEL PROYECTO: "${texto}"

Devuelve ÚNICAMENTE un objeto JSON válido con este formato exacto, sin texto adicional, sin bloques de código:

}`;

  const CLOUD_FN_URL = 'https://europe-west1-keweke-presupuestos-583aa.cloudfunctions.net/geminiGenerate';

function normalizeKey(s) {
  return String(s).toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // remove accents
    .replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ');
}

function applyGemini(secciones, gd) {
  if(!gd.partidas) return secciones;

  // Build a normalized lookup of what Gemini returned
  const gdNorm = {};
  for(const [secKey, partidas] of Object.entries(gd.partidas)) {
    const normSec = normalizeKey(secKey);
    gdNorm[normSec] = {};
    for(const [concKey, vals] of Object.entries(partidas||{})) {
      gdNorm[normSec][normalizeKey(concKey)] = vals;
    }
  }

  console.log('Gemini raw partidas:', JSON.stringify(gd.partidas));
  console.log('Gemini normalized:', JSON.stringify(gdNorm));

  return secciones.map(sec => {
    const normSec = normalizeKey(sec.nombre);
    // Try exact normalized match first, then partial match
    const secData = gdNorm[normSec] ||
      Object.entries(gdNorm).find(([k])=>k.includes(normSec)||normSec.includes(k))?.[1] || {};

    return {
      ...sec,
      partidas: sec.partidas.map(p => {
        const normConc = normalizeKey(p.concepto);
        // Try exact normalized match, then partial match
        const match = secData[normConc] ||
          Object.entries(secData).find(([k])=>k.includes(normConc)||normConc.includes(k))?.[1];

        if(match) {
          console.log(`✓ Match: [${sec.nombre}] "${p.concepto}" → uds:${match.uds} jornadas:${match.jornadas}`);
          const uds = Number(match.uds) || 0;
          const jornadas = Number(match.jornadas) || 0;
          // Si la partida no aplica (uds=0), dejar jornadas también a 0 para mantener consistencia
          // con la creación manual y que el resumen muestre los campos vacíos en gris
          if (uds === 0) return {...p, uds: 0, jornadas: 0};
          return {...p, uds, jornadas: jornadas || 1};
        }
        return p;
      })
    };
  });
}

// Avatar circular del usuario, con tooltip informativo al pasar el ratón
function UserBadge({user, size=24, tooltip=''}) {
  if(!user) return null;
  const initials = (user.name||user.email||'?').split(/[\s@.]+/).filter(Boolean).slice(0,2).map(s=>s[0]?.toUpperCase()||'').join('');
  const bg = user.photo ? 'transparent' : 'var(--surface3)';
  return React.createElement('div',{
    style:{width:size,height:size,borderRadius:'50%',flexShrink:0,
      background:bg,overflow:'hidden',display:'flex',alignItems:'center',
      justifyContent:'center',fontSize:Math.floor(size*0.4),fontWeight:600,
      color:'var(--text2)',border:'1px solid var(--border)',
      position:'relative',cursor:'help'},
    title: tooltip || user.name || user.email || ''
  },
    user.photo
      ? React.createElement('img',{src:user.photo,alt:user.name||'',
          style:{width:'100%',height:'100%',objectFit:'cover'}})
      : initials
  );
}

function Toast({msg,type}) {
  if(!msg) return null;
  const bg = type==='error'?'#3b0000':type==='ok'?'#002b1a':'#1a1f2e';
  const bc = type==='error'?'#ef4444':type==='ok'?'var(--green)':'var(--blue)';
  return React.createElement('div',{style:{
    position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,
    border:`1px solid ${bc}`,color:'var(--text)',padding:'10px 18px',
    borderRadius:'var(--r)',fontSize:13,fontWeight:500,maxWidth:320,
    animation:'fadeIn .2s ease',boxShadow:'0 4px 20px rgba(0,0,0,.5)'
  }},msg);
}

function ClienteInput({value, onChange, clients}) {
  const [open,setOpen] = useState(false);
  const [q,setQ] = useState(value||'');
  const wrapRef = useRef(null);
  useEffect(()=>{ setQ(value||''); },[value]);
  const sugs = useMemo(()=>!q?[]:clients.filter(c=>c.toLowerCase().includes(q.toLowerCase())).slice(0,8),[q,clients]);
  useEffect(()=>{
    const fn = e=>{ if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',fn);
    return ()=>document.removeEventListener('mousedown',fn);
  },[]);
  return React.createElement('div',{ref:wrapRef,style:{position:'relative'}},
    React.createElement('input',{
      value:q, placeholder:'Cliente...',
      onChange:e=>{ setQ(e.target.value); onChange(e.target.value); setOpen(true); },
      onFocus:()=>setOpen(true)
    }),
    open&&sugs.length>0&&React.createElement('div',{style:{
      position:'absolute',top:'calc(100% + 4px)',left:0,right:0,zIndex:999,
      background:'var(--surface3)',border:'1px solid var(--border2)',
      borderRadius:'var(--r)',overflow:'hidden',boxShadow:'0 8px 24px rgba(0,0,0,.6)'
    }},
      sugs.map(s=>React.createElement('div',{
        key:s, onMouseDown:()=>{ onChange(s); setQ(s); setOpen(false); },
        style:{padding:'9px 14px',cursor:'pointer',fontSize:13},
        onMouseEnter:e=>e.target.style.background='var(--surface2)',
        onMouseLeave:e=>e.target.style.background='transparent'
      },s))
    )
  );
}

function StatCard({label,value,sub,color}) {
  return React.createElement('div',{style:{
    background:'var(--surface)',border:'1px solid var(--border)',
    borderRadius:'var(--r2)',padding:'20px 24px',flex:1,minWidth:160
  }},
    React.createElement('div',{style:{fontSize:11,color:'var(--text2)',fontWeight:700,
      letterSpacing:'0.5px',textTransform:'uppercase',marginBottom:10}},label),
    React.createElement('div',{style:{fontSize:28,fontWeight:700,color:color||'var(--text)',
      fontFamily:"'DM Mono',monospace"}},value),
    sub&&React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:4}},sub)
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({proyectos, onSelect, onNew, onDelete, clients}) {
  const [search,setSearch] = useState('');
  const [fEstado,setFEstado] = useState('');
  const [fTipo,setFTipo] = useState('');
  const [fCliente,setFCliente] = useState('');
  const [sortBy,setSortBy] = useState('fecha');

  const now = new Date();
  const thisMonth = proyectos.filter(p=>{
    if(!p.fecha) return false;
    const d=new Date(p.fecha); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  const aprobados = proyectos.filter(p=>p.estado==='aprobado');
  const totalImp = proyectos.reduce((s,p)=>s+(calcTotals(p).total||0),0);
  const aprobImp = aprobados.reduce((s,p)=>s+(calcTotals(p).total||0),0);
  const clientes = [...new Set(proyectos.map(p=>p.cliente).filter(Boolean))].sort();

  const filtered = proyectos.filter(p=>{
    if(fEstado&&p.estado!==fEstado) return false;
    if(fTipo&&p.tipo!==fTipo) return false;
    if(fCliente&&p.cliente!==fCliente) return false;
    if(search){ const q=search.toLowerCase();
      return (p.codigo||'').toLowerCase().includes(q)||(p.cliente||'').toLowerCase().includes(q)||(p.nombre||'').toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>{
    if(sortBy==='fecha') return (b.fecha||'').localeCompare(a.fecha||'');
    if(sortBy==='importe') return (calcTotals(b).total||0)-(calcTotals(a).total||0);
    if(sortBy==='cliente') return (a.cliente||'').localeCompare(b.cliente||'');
    return 0;
  });

  const topClientes = Object.entries(
    proyectos.reduce((acc,p)=>{ if(!p.cliente) return acc; acc[p.cliente]=(acc[p.cliente]||0)+(calcTotals(p).total||0); return acc; },{})
  ).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const Sel = ({lbl,val,onChange,opts})=>React.createElement('select',{
    value:val, onChange:e=>onChange(e.target.value),
    style:{width:'auto',minWidth:130,fontSize:13,padding:'7px 10px'}
  },
    React.createElement('option',{value:''},lbl),
    opts.map(o=>React.createElement('option',{key:o.v,value:o.v},o.l))
  );

  return React.createElement('div',{style:{padding:'28px 32px',animation:'fadeIn .3s ease'}},
    // Header
    React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:32}},
      React.createElement('div',{},
        React.createElement('h1',{style:{fontSize:24,fontWeight:700,letterSpacing:'-0.5px'}},
          React.createElement('span',{style:{color:'var(--red)'}},'keweke'),
          React.createElement('span',{style:{color:'var(--text2)',fontWeight:400,fontSize:16,marginLeft:12}}, 'presupuestos')
        )
      ),
      React.createElement('div',{style:{display:'flex',gap:10}},
        React.createElement('button',{onClick:onNew,style:{
          background:'var(--red)',color:'white',padding:'11px 22px',
          fontSize:14,borderRadius:'var(--r2)'
        }},'+ Nuevo presupuesto')
      )
    ),

    // Stats
    React.createElement('div',{style:{display:'flex',gap:12,marginBottom:28,flexWrap:'wrap'}},
      React.createElement(StatCard,{label:'Total presupuestado',value:fEUR(totalImp),
        sub:`${proyectos.length} presupuesto${proyectos.length!==1?'s':''}`,color:'var(--text)'}),
      React.createElement(StatCard,{label:'Aprobados',value:fEUR(aprobImp),
        sub:`${aprobados.length} aprobado${aprobados.length!==1?'s':''}`,color:'var(--green)'}),
      React.createElement(StatCard,{label:'Este mes',value:String(thisMonth.length),
        sub:'presupuestos generados',color:'var(--blue)'}),
      React.createElement(StatCard,{label:'Enviados',
        value:String(proyectos.filter(p=>p.estado==='enviado').length),
        sub:'pendientes de respuesta',color:'var(--orange)'})
    ),

    // Charts row
    proyectos.length>0&&React.createElement('div',{style:{display:'flex',gap:12,marginBottom:28,flexWrap:'wrap'}},
      React.createElement('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',
        borderRadius:'var(--r2)',padding:'18px 22px',flex:1,minWidth:220}},
        React.createElement('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.5px',
          textTransform:'uppercase',color:'var(--text2)',marginBottom:14}},'Top clientes'),
        topClientes.length===0
          ? React.createElement('div',{style:{color:'var(--text3)',fontSize:13}},'Sin datos aún')
          : topClientes.map(([c,imp])=>React.createElement('div',{key:c,style:{
              display:'flex',justifyContent:'space-between',padding:'6px 0',
              borderBottom:'1px solid var(--border)',fontSize:13
            }},
            React.createElement('span',{},c),
            React.createElement('span',{style:{color:'var(--text2)',fontFamily:"'DM Mono',monospace",fontSize:12}},fEUR(imp))
          ))
      ),
      React.createElement('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',
        borderRadius:'var(--r2)',padding:'18px 22px',flex:1,minWidth:200}},
        React.createElement('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.5px',
          textTransform:'uppercase',color:'var(--text2)',marginBottom:14}},'Por estado'),
        Object.entries(ESTADO_LABELS).map(([k,l])=>{
          const n=proyectos.filter(p=>p.estado===k).length;

// ── SPINNER INPUT (Uds / Jornadas) ────────────────────────────────────────────
function SpinnerInput({value, onChange, min=0}) {
  const [editing, setEditing] = useState(false);
  const [raw, setRaw] = useState(String(value));

  useEffect(()=>{ if(!editing) setRaw(String(value)); },[value, editing]);

  const commit = (v) => {
    const n = parseInt(v, 10);
    const safe = isNaN(n) ? min : Math.max(min, n);
    onChange(safe);
    setRaw(String(safe));
    setEditing(false);
  };

  const step = (delta) => {
    const n = Math.max(min, value + delta);
    onChange(n);
    setRaw(String(n));
  };

  return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:1}},
    React.createElement('button',{
      onMouseDown:e=>{ e.preventDefault(); step(1); },
      style:{background:'transparent',color:'var(--text3)',padding:'1px 6px',fontSize:9,lineHeight:1,
        border:'none',borderRadius:'3px 3px 0 0',cursor:'pointer',width:'100%',
        transition:'all .1s'},
      onMouseEnter:e=>{ e.target.style.color='var(--text)'; e.target.style.background='var(--surface3)'; },
      onMouseLeave:e=>{ e.target.style.color='var(--text3)'; e.target.style.background='transparent'; }
    },'▲'),
    React.createElement('input',{
      type:'text',
      value:editing ? raw : String(value),
      className:'nospin',
      onFocus:()=>{ setEditing(true); setRaw(value===0?'':String(value)); },
      onChange:e=>setRaw(e.target.value),
      onBlur:()=>commit(raw),
      onKeyDown:e=>{
        if(e.key==='Enter') { e.target.blur(); }
        else if(e.key==='ArrowUp') { e.preventDefault(); step(1); }
        else if(e.key==='ArrowDown') { e.preventDefault(); step(-1); }
      },
      style:{padding:'3px 4px',fontSize:12,textAlign:'center',width:'100%',
        background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:0,
        color: value===0?'var(--text3)':'var(--text)'}
    }),
    React.createElement('button',{
      onMouseDown:e=>{ e.preventDefault(); step(-1); },
      style:{background:'transparent',color:'var(--text3)',padding:'1px 6px',fontSize:9,lineHeight:1,
        border:'none',borderRadius:'0 0 3px 3px',cursor:'pointer',width:'100%',
        transition:'all .1s'},
      onMouseEnter:e=>{ e.target.style.color='var(--text)'; e.target.style.background='var(--surface3)'; },
      onMouseLeave:e=>{ e.target.style.color='var(--text3)'; e.target.style.background='transparent'; }
    },'▼')
  );
}

function Editor({proyecto, proyectoVersiones, onBack, onSave, onSavePDF, onCreateVersion, clients, allCodes, pdfBusy}) {
  const versiones = proyectoVersiones || [proyecto];
  const [verIdx, setVerIdx] = useState(0);
  const proyectoActivo = versiones[verIdx] || proyecto;

  const [p,setP] = useState(proyectoActivo);
  const saveTimer = useRef(null);
  const isSaving = useRef(false);

  // Only reset local state when switching project or version — NOT on every Firestore update
  useEffect(()=>{ setP(proyectoActivo); },[proyectoActivo?.id, verIdx]);

  // Silently sync pdfUrl and driveFileId from Firestore without disrupting editing
  useEffect(()=>{
    if(!proyectoActivo?.pdfUrl && !proyectoActivo?.driveFileId) return;
    if(isSaving.current) return;
    setP(prev=>({
      ...prev,
      pdfUrl: proyectoActivo.pdfUrl || prev.pdfUrl,
      driveFileId: proyectoActivo.driveFileId || prev.driveFileId,
      savedToDrive: proyectoActivo.savedToDrive || prev.savedToDrive,
    }));
  },[proyectoActivo?.pdfUrl, proyectoActivo?.driveFileId]);

  const upd = useCallback(cb=>{
    setP(prev=>{
      const next = typeof cb==='function'?cb(prev):{...prev,...cb};
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(()=>{
        isSaving.current = true;
        onSave(next).finally?.(()=>{ setTimeout(()=>{ isSaving.current = false; }, 500); });
        onSave(next);
      },800);
      return next;
    });
  },[onSave]);

  const tots = calcTotals(p);

  const updPartida = (si,pi,field,val)=>upd(prev=>{
    const secs=[...prev.secciones];
    const parts=[...secs[si].partidas];
    parts[pi]={...parts[pi],[field]:val};
    secs[si]={...secs[si],partidas:parts};
    return {...prev,secciones:secs};
  });

  const addPartida = (si)=>upd(prev=>{
    const secs=[...prev.secciones];
    const parts=[...secs[si].partidas, {
      id: Math.random().toString(36).slice(2),
      concepto:'Nueva partida', uds:0, jornadas:0, precio:0, dto:0
    }];
    secs[si]={...secs[si],partidas:parts};
    return {...prev,secciones:secs};
  });

    const secs=[...prev.secciones];
    const parts=secs[si].partidas.filter((_,i)=>i!==pi);
    secs[si]={...secs[si],partidas:parts};
    return {...prev,secciones:secs};

            background:(PLANTILLAS[p.tipo||'general']?.color||'#fff')+'22',

            PLANTILLAS[p.tipo||'general']?.icon+' '+PLANTILLAS[p.tipo||'general']?.label),

          paddingTop:14,marginTop:4,fontSize:20,fontWeight:700}},
          React.createElement('span',{style:{color:'var(--text2)',textTransform:'uppercase',fontSize:14,
            alignSelf:'center'}}, 'TOTAL'),
          React.createElement('span',{style:{color:'var(--red)',fontFamily:"'DM Mono',monospace"}},fEUR(tots.total))
        )
      ),

      // Acciones
      React.createElement('div',{style:{padding:'14px 16px',borderTop:'1px solid var(--border)',
        display:'flex',flexDirection:'column',gap:8}},
        React.createElement('button',{onClick:()=>onSavePDF(p),disabled:pdfBusy,style:{
          background:'var(--red)',color:'white',padding:'10px',fontSize:13,width:'100%'
        }},pdfBusy?'↑ Guardando...':'☁ Guardar PDF'),
        React.createElement('button',{
          onClick:()=>exportPDFlocal(p),
          style:{background:'var(--surface2)',color:'var(--text)',padding:'10px',fontSize:13,
            width:'100%',border:'1px solid var(--border2)'}
        },'🖨 Exportar PDF'),
        p.pdfUrl&&React.createElement('button',{
          onClick:()=>window.open(p.pdfUrl,'_blank'),
          style:{background:'transparent',color:'var(--blue)',padding:'8px',fontSize:12,
            width:'100%',border:'1px solid var(--border)'}
        },'↗ Ver PDF guardado')
      )
    )
  );
}

// ── NEW MODAL ─────────────────────────────────────────────────────────────────
function NewModal({onClose, onCreate, onCreateFromVoice, clients, nextCode}) {
  const [tipo,setTipo] = useState('general');
  const [cliente,setCliente] = useState('');
  const [nombre,setNombre] = useState('');
  const [mode, setMode] = useState('manual'); // 'manual' | 'voice'
  const [voiceText, setVoiceText] = useState('');
  const [voiceLoading, setVoiceLoading] = useState(false);
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const code = nextCode();

  const startVoice = ()=>{
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert('Usa Chrome para reconocimiento de voz'); return; }
    const r=new SR(); r.lang='es-ES'; r.continuous=true; r.interimResults=true;
    r.onresult=e=>setVoiceText(Array.from(e.results).map(r=>r[0].transcript).join(''));
    r.onend=()=>setListening(false);
    r.start(); recRef.current=r; setListening(true);
  };
  const stopVoice=()=>{ recRef.current?.stop(); setListening(false); };

  const runVoiceAI = async()=>{
    if(!voiceText.trim()) return;
    setVoiceLoading(true);
    try {
      const result = await geminiGenerate(voiceText, tipo);
      stopVoice();
      onClose();
      await onCreateFromVoice(tipo, result);
    } catch(e){ alert('Error Gemini: '+e.message); }
    setVoiceLoading(false);
  };

  return React.createElement('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:1000,
      display:'flex',alignItems:'center',justifyContent:'center'},
    onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement('div',{style:{background:'var(--surface)',border:'1px solid var(--border2)',
      borderRadius:16,padding:32,width:500,animation:'fadeIn .2s ease'}},
      React.createElement('h2',{style:{fontSize:18,fontWeight:700,marginBottom:20}},
        'Nuevo  ',
        React.createElement('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:14,
          color:'var(--red)',fontWeight:400}},code)
      ),

      // Selector de plantilla
      React.createElement('div',{style:{marginBottom:20}},
        React.createElement('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.5px',
          textTransform:'uppercase',color:'var(--text2)',marginBottom:10}},'Plantilla'),
        React.createElement('div',{style:{display:'flex',gap:8}},
          Object.entries(PLANTILLAS).map(([k,pl])=>React.createElement('button',{key:k,
            onClick:()=>setTipo(k),
            style:{flex:1,padding:'12px 8px',
              background:tipo===k?pl.color+'22':'var(--surface2)',
              border:`1px solid ${tipo===k?pl.color:'var(--border)'}`,
              color:tipo===k?pl.color:'var(--text2)',borderRadius:'var(--r)',
              fontSize:13,fontWeight:700}
          },pl.icon+' '+pl.label))
        )
      ),

      // Tabs manual / voz
      React.createElement('div',{style:{display:'flex',gap:4,marginBottom:20,
        background:'var(--surface2)',borderRadius:'var(--r)',padding:4}},
        React.createElement('button',{onClick:()=>setMode('manual'),style:{
          flex:1,padding:'8px',fontSize:13,fontWeight:600,borderRadius:6,
          background:mode==='manual'?'var(--surface3)':'transparent',
          color:mode==='manual'?'var(--text)':'var(--text3)',border:'none'}
        },'✍ Manual'),
        React.createElement('button',{onClick:()=>setMode('voice'),style:{
          flex:1,padding:'8px',fontSize:13,fontWeight:600,borderRadius:6,
          background:mode==='voice'?'var(--surface3)':'transparent',
          color:mode==='voice'?'var(--text)':'var(--text3)',border:'none'}
        },'🎙 Dictar con IA')
      ),

      mode==='manual'&&React.createElement('div',{},
        React.createElement('div',{style:{marginBottom:14}},
          React.createElement('label',{style:{fontSize:11,color:'var(--text2)',fontWeight:700,
            letterSpacing:'0.4px',textTransform:'uppercase',display:'block',marginBottom:6}},'Cliente'),
          React.createElement(ClienteInput,{value:cliente,onChange:setCliente,clients})
        ),
        React.createElement('div',{style:{marginBottom:24}},
          React.createElement('label',{style:{fontSize:11,color:'var(--text2)',fontWeight:700,
            letterSpacing:'0.4px',textTransform:'uppercase',display:'block',marginBottom:6}},'Proyecto'),
          React.createElement('input',{value:nombre,onChange:e=>setNombre(e.target.value),
            placeholder:'Nombre del proyecto...',
            onKeyDown:e=>e.key==='Enter'&&cliente&&nombre&&onCreate(tipo,cliente,nombre)})
        ),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          React.createElement('button',{onClick:onClose,style:{background:'var(--surface2)',
            color:'var(--text)',padding:'10px 20px'}},'Cancelar'),
          React.createElement('button',{onClick:()=>onCreate(tipo,cliente,nombre),
            disabled:!cliente||!nombre,
            style:{background:'var(--red)',color:'white',padding:'10px 20px',
              opacity:!cliente||!nombre?0.45:1}},
            'Crear · '+code)
        )
      ),

      mode==='voice'&&React.createElement('div',{},
        // Estado de carga
        voiceLoading&&React.createElement('div',{style:{
          textAlign:'center',padding:'28px 0',
          display:'flex',flexDirection:'column',alignItems:'center',gap:12}},
          React.createElement('div',{style:{fontSize:28,animation:'spin 1s linear infinite',display:'inline-block'}},'✨'),
          React.createElement('div',{style:{fontSize:14,color:'var(--text)',fontWeight:600}},'Generando presupuesto...'),
          React.createElement('div',{style:{fontSize:12,color:'var(--text3)'}},'Gemini está analizando la descripción')
        ),
        !voiceLoading&&React.createElement('div',{},
          React.createElement('p',{style:{fontSize:13,color:'var(--text2)',marginBottom:10}},
            'Describe el proyecto — Gemini rellenará las partidas automáticamente.'),
          // Textarea con indicador de grabación
          React.createElement('div',{style:{position:'relative',marginBottom:10}},
            React.createElement('textarea',{
              value:voiceText,
              onChange:e=>setVoiceText(e.target.value),
              placeholder:'Ej: Spot para Freshly Cosmetics, un día de rodaje en Barcelona interior con realizador, DoP, maquilladora y catering. Postproducción con edición, telecine y música de archivo...',
              rows:5,style:{resize:'vertical',paddingRight:40,
                border: listening?'1px solid var(--red)':'1px solid var(--border)',
                transition:'border .2s'}
            }),
            listening&&React.createElement('div',{style:{
              position:'absolute',top:10,right:10,
              width:10,height:10,borderRadius:'50%',
              background:'var(--red)',animation:'pulse 1s ease infinite'
            }})
          ),
          // Conteo de caracteres
          voiceText.length>0&&React.createElement('div',{style:{
            fontSize:11,color:'var(--text3)',marginBottom:10,textAlign:'right'
          }},`${voiceText.length} caracteres`),
          React.createElement('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            React.createElement('button',{
              onClick:listening?stopVoice:startVoice,
              style:{background:listening?'var(--red)':'var(--surface2)',
                color:listening?'white':'var(--text)',padding:'10px 16px',
                animation:listening?'pulse 1s ease infinite':'',
                border:`1px solid ${listening?'var(--red)':'var(--border2)'}`,
                display:'flex',alignItems:'center',gap:8,fontWeight:600}
            },
              listening
                ? React.createElement('span',{},'⏹ Parar grabación')
                : React.createElement('span',{},'🎙 Grabar voz')
            ),
            React.createElement('div',{style:{flex:1}}),
            React.createElement('button',{onClick:()=>{ stopVoice(); onClose(); },
              style:{background:'var(--surface2)',color:'var(--text)',padding:'10px 16px',
                border:'1px solid var(--border2)'}},'Cancelar'),
            React.createElement('button',{
              onClick:runVoiceAI,
              disabled:!voiceText.trim(),
              style:{background:'var(--red)',color:'white',padding:'10px 22px',
                fontWeight:700,fontSize:14,
                opacity:!voiceText.trim()?0.4:1}
            },'✨ Crear presupuesto')
          )
        )
      )
    )
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin,busy,err}) {
  return React.createElement('div',{style:{minHeight:'100vh',display:'flex',
    alignItems:'center',justifyContent:'center',background:'var(--bg)',
    flexDirection:'column',gap:28}},
    React.createElement('div',{style:{textAlign:'center'}},
      React.createElement('img',{src:LOGO,style:{height:44,marginBottom:20}}),
      React.createElement('p',{style:{color:'var(--text2)',fontSize:14,marginTop:6}},
        'Gestión de presupuestos · Productora audiovisual'),
      React.createElement('p',{style:{color:'var(--text3)',fontSize:12,marginTop:4}},
        'Acceso exclusivo para cuentas @keweke.com')
    ),
    React.createElement('button',{onClick:onLogin,disabled:busy,style:{
      background:'white',color:'#111',padding:'13px 28px',
      fontSize:15,fontWeight:600,borderRadius:12,
      display:'flex',alignItems:'center',gap:12,opacity:busy?.6:1
    }},
      React.createElement('img',{src:'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg',
        style:{width:20,height:20}}),
      busy?'Conectando...':'Entrar con Google'
    ),
    err&&React.createElement('p',{style:{color:'#ef4444',fontSize:13}},err)
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [fbReady,setFbReady]     = useState(!!window._FB_READY);
  const [user,setUser]           = useState(null);
  const [authBusy,setAuthBusy]   = useState(false);
  const [authErr,setAuthErr]     = useState('');
  const [proyectos,setProyectos] = useState([]);
  const [view,setView]           = useState('dashboard');
  const [curId,setCurId]         = useState(null);
  const [showNew,setShowNew]     = useState(false);
  const [pdfBusy,setPdfBusy]     = useState(false);
  const [toast,setToast]         = useState(null);
  const [clients,setClients]     = useState([]);
  const [allCodes,setAllCodes]   = useState([]);

  const [isLight, setIsLight] = useState(document.documentElement.classList.contains('light'));

  const toggleTheme = ()=>{
    const newLight = !isLight;
    document.documentElement.classList.toggle('light', newLight);
    localStorage.setItem('theme', newLight?'light':'dark');
    setIsLight(newLight);
  };

  const flash = (msg,type='ok')=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3500); };

  useEffect(()=>{
    if(window._FB_READY){ setFbReady(true); return; }
    window.addEventListener('fb-ready',()=>setFbReady(true),{once:true});
  },[]);

  useEffect(()=>{
    if(!fbReady) return;
    const {auth,onAuthStateChanged} = window._FB;
    return onAuthStateChanged(auth, async u=>{
      if(u) {
        // Only allow @keweke.com accounts
        if(!u.email?.endsWith('@keweke.com')) {
          const {signOut} = window._FB;
          await signOut(auth);
          setAuthErr('Acceso restringido a cuentas @keweke.com');
          setUser(null);
          setProyectos([]);
          return;
        }
      }
      setUser(u);
      if(!u){ setProyectos([]); }
    });
  },[fbReady]);

  useEffect(()=>{
    if(!user||!fbReady) return;
    const {db,collection,query,orderBy,onSnapshot} = window._FB;
    const q = query(collection(db,'presupuestos'),orderBy('updatedAt','desc'));
    return onSnapshot(q,snap=>{
      const docs=snap.docs.map(d=>d.data());
      setProyectos(docs);
      setAllCodes(docs.map(d=>d.codigo).filter(Boolean));
      setClients([...new Set(docs.map(d=>d.cliente).filter(Boolean))].sort());
    },err=>console.warn('Firestore:',err));
  },[user,fbReady]);

  const login = async()=>{
    if(!fbReady) return;
    setAuthBusy(true); setAuthErr('');
    try {
      const {auth,GoogleAuthProvider,signInWithPopup,signOut}=window._FB;
      const result = await signInWithPopup(auth,new GoogleAuthProvider());
      if(!result.user.email?.endsWith('@keweke.com')) {
        await signOut(auth);
        setAuthErr('Acceso restringido a cuentas @keweke.com');
      }
    } catch(e){ setAuthErr(e.code==='auth/popup-closed-by-user'?'Ventana cerrada. Inténtalo de nuevo.':e.message); }
    setAuthBusy(false);
  };

  const logout=async()=>{
    const {auth,signOut}=window._FB; await signOut(auth);
    setView('dashboard'); setCurId(null);
  };

  const suggestCode = ()=>nextCode(allCodes);

  const createPresupuesto = async(tipo,cliente,nombre)=>{
    const codigo=suggestCode();
    const id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    const nuevo={
      id,codigo,tipo,cliente,nombre,
      fecha:new Date().toISOString().slice(0,10),
      fechaProduccion:'',localizacion:'',descripcion:'',noIncluye:'Otras partidas no descritas.',
      estado:'borrador',margen:20,iva:0,
      secciones:buildSecciones(tipo),
      pdfUrl:'',savedToDrive:false,
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString()
    };
    await fbSave(nuevo, user);
    setShowNew(false); setCurId(id); setView('editor');
    flash('✓ '+codigo+' creado');
  };

  const savePresupuesto = async(proyecto)=>{
    try{ await fbSave(proyecto, user); }
    catch(e){ flash('Error guardando: '+e.message,'error'); }
  };

  const savePDF = async(proyecto)=>{
    setPdfBusy(true);
    try {
      const html=buildPDF(proyecto,calcTotals(proyecto),proyecto.codigo);
      const url=await fbUploadPDF(proyecto,html);
      const updated={...proyecto,savedToDrive:true,pdfUrl:url};
      await fbSave(updated, user);
      flash('✓ PDF guardado en Drive');
    } catch(e){ flash('Error PDF: '+e.message,'error'); }
    setPdfBusy(false);
  };

  const deletePresupuesto = async(id)=>{
    try {
      await fbDelete(id);
      if(curId===id){ setView('dashboard'); setCurId(null); }
      flash('Presupuesto eliminado');
    } catch(e){ flash('Error: '+e.message,'error'); }
  };

  const cur = proyectos.find(p=>p.id===curId)||null;

  if(!fbReady) return React.createElement('div',{style:{minHeight:'100vh',display:'flex',
    alignItems:'center',justifyContent:'center',color:'var(--text2)'}},
    React.createElement('span',{className:'spinner',style:{marginRight:10,fontSize:20}},'◌'),
    ' Iniciando...');

  if(!user) return React.createElement(LoginScreen,{onLogin:login,busy:authBusy,err:authErr});

  return React.createElement('div',{style:{minHeight:'100vh'}},
    // Nav
    React.createElement('div',{style:{position:'fixed',top:0,left:0,right:0,zIndex:100,height:48,
      background:'var(--surface)',borderBottom:'1px solid var(--border)',
      display:'flex',alignItems:'center',padding:'0 20px',gap:12}},
      React.createElement('img',{src:LOGO,style:{height:22,cursor:'pointer'},
        onClick:()=>{ setView('dashboard'); setCurId(null); }}),
      view==='editor'&&cur&&React.createElement('div',{style:{display:'flex',alignItems:'center',
        gap:8,flex:1,minWidth:0,overflow:'hidden'}},
        React.createElement('span',{style:{color:'var(--text3)'}},'›'),
        React.createElement('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:12,
          color:'var(--red)',flexShrink:0}},cur.codigo),
        React.createElement('span',{style:{color:'var(--text3)'}},'›'),
        React.createElement('span',{style:{fontSize:13,color:'var(--text2)',
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},cur.nombre||'Sin nombre'),
        React.createElement('span',{style:{fontSize:11,marginLeft:4,padding:'2px 8px',borderRadius:4,
          background:ESTADO_COLORS[cur.estado||'borrador']+'22',
          color:ESTADO_COLORS[cur.estado||'borrador'],flexShrink:0}},ESTADO_LABELS[cur.estado||'borrador']),
        cur.savedToDrive&&React.createElement('span',{style:{fontSize:11,color:'var(--green)',flexShrink:0}},'✓ PDF')
      ),
      React.createElement('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}},
        React.createElement('button',{
          onClick: toggleTheme,
          style:{background:'var(--surface2)',color:'var(--text2)',padding:'4px 10px',
            fontSize:16,border:'1px solid var(--border)',borderRadius:'var(--r)'},
          title:'Cambiar tema'
        }, isLight ? '🌙' : '☀️'),
        React.createElement('span',{style:{fontSize:12,color:'var(--text3)'}},user.displayName||user.email),
        user.photoURL&&React.createElement('img',{src:user.photoURL,style:{
          width:28,height:28,borderRadius:'50%',border:'1px solid var(--border2)'}}),
        React.createElement('button',{onClick:logout,style:{background:'transparent',
          color:'var(--text3)',padding:'4px 8px',fontSize:12}},'Salir')
      )
    ),

    React.createElement('div',{style:{paddingTop:48,minHeight:'100vh'}},
      view==='dashboard'
        ? React.createElement(Dashboard,{proyectos,clients,
            onSelect:p=>{ setCurId(p.id); setView('editor'); },
            onNew:()=>setShowNew(true),
            onDelete:deletePresupuesto
          })
        : cur
          ? React.createElement(Editor,{proyecto:cur,
              proyectoVersiones: proyectos.filter(p=>p.codigo===cur.codigo)
                .sort((a,b)=>(b.updatedAt?.seconds||0)-(a.updatedAt?.seconds||0)),
              clients,allCodes,pdfBusy,
              onBack:()=>{ setView('dashboard'); setCurId(null); },
              onSave:savePresupuesto,
              onSavePDF:savePDF,
              onCreateVersion:async(proyectoBase)=>{
                const versionesActuales = proyectos.filter(p=>p.codigo===proyectoBase.codigo);
                const newVerNum = versionesActuales.length + 1;
                const id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
                const nueva={
                  ...proyectoBase,
                  id,
                  versionNum: newVerNum,
                  estado:'borrador',
                  pdfUrl:'',savedToDrive:false,
                  createdAt:new Date().toISOString(),
                  updatedAt:new Date().toISOString()
                };
                await fbSave(nueva, user);
                setCurId(id);
                flash('✓ v'+newVerNum+' creada — '+proyectoBase.codigo);
              }})
          : React.createElement('div',{style:{padding:48,color:'var(--text3)'}},
              'Presupuesto no encontrado.')
    ),

    showNew&&React.createElement(NewModal,{onClose:()=>setShowNew(false),
      onCreate:createPresupuesto,
      onCreateFromVoice:async(tipo,geminiData)=>{
        const codigo=suggestCode();
        const id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
        const secciones = applyGemini(buildSecciones(tipo), geminiData);
        const nuevo={
          id,codigo,tipo,
          cliente:geminiData.cliente||'',
          nombre:geminiData.nombre||'',
          fecha:new Date().toISOString().slice(0,10),
          fechaProduccion:geminiData.fechaProduccion||'',
          localizacion:geminiData.localizacion||'',
          descripcion:geminiData.descripcion||'',
          noIncluye:'Otras partidas no descritas.',
          estado:'borrador',margen:20,iva:0,
          secciones,pdfUrl:'',savedToDrive:false,
          createdAt:new Date().toISOString(),
          updatedAt:new Date().toISOString()
        };
        await fbSave(nuevo, user);
        setShowNew(false); setCurId(id); setView('editor');
        flash('✓ '+codigo+' creado con IA');
      },
      clients,nextCode:suggestCode}),
    React.createElement(Toast,{msg:toast?.msg,type:toast?.type})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
